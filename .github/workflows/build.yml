name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      SKIP_JDK_VERSION_CHECK: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Override JAVA_HOME to JDK 17
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;25.2.9519653" "cmake;3.22.1"


      - name: Generate gradlew
      - name: Generate gradlew if missing
 refs/remotes/origin/main
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version=7.6.1
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MouseLockApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
